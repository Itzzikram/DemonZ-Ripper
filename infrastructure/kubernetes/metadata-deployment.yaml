apiVersion: apps/v1
kind: Deployment
metadata:
  name: ripper-ui
  labels:
    app: ripper-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ripper-ui
  template:
    metadata:
      labels:
        app: ripper-ui
    spec:
      containers:
        - name: ripper-ui
          image: demonz-ripper/ripper-ui:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: ripper-ui
spec:
  selector:
    app: ripper-ui
  ports:
    - port: 80
      targetPort: 80
